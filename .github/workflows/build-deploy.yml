name: Build and deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_VERSION: "6.8.2"
  WORKING_DIR: pos-desktop

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-14
            host: mac
            arch: clang_64
          # Jammy (22.04): linuxdeployqt requires glibc <= 2.35 for portable bundles.
          - platform: linux
            os: ubuntu-22.04
            host: linux
            arch: linux_gcc_64
          - platform: windows
            os: windows-latest
            host: windows
            arch: win64_msvc2022_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: ${{ matrix.host }}
          target: desktop
          arch: ${{ matrix.arch }}
          # PrintSupport is part of qtbase; only Multimedia is a separate installer module.
          modules: qtmultimedia
          cache: true

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libfuse2

      - name: Setup MSVC
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (macOS)
        if: matrix.platform == 'macos'
        run: brew install ninja

      - name: Configure CMake
        working-directory: ${{ env.WORKING_DIR }}
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      - name: Build
        working-directory: ${{ env.WORKING_DIR }}
        run: cmake --build build

      - name: Package
        shell: bash
        run: bash .github/scripts/package-desktop.sh ${{ matrix.platform }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            ${{ env.WORKING_DIR }}/dist/*.zip
            ${{ env.WORKING_DIR }}/dist/*.tar.gz
          if-no-files-found: error
          retention-days: 90

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS, Linux, and Windows artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release files
        run: |
          set -euo pipefail
          mkdir -p release-flat
          find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp -v {} release-flat/ \;
          echo "Files for release:"
          ls -la release-flat/
          macos="$(find release-flat -name '*-macos.zip' | wc -l)"
          linux="$(find release-flat -name '*-linux*.tar.gz' | wc -l)"
          windows="$(find release-flat -name '*-windows*.zip' | wc -l)"
          if [[ "$macos" -lt 1 || "$linux" -lt 1 || "$windows" -lt 1 ]]; then
            echo "Expected macOS zip, Linux tar.gz, and Windows zip — got macos=$macos linux=$linux windows=$windows" >&2
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Downloads

            | Platform | Archive |
            |----------|---------|
            | **macOS** (Apple Silicon) | `ZeebrooPosDesktop-*-macos.zip` — unzip, open `.app` |
            | **Linux** (x86_64, glibc 2.35+) | `ZeebrooPosDesktop-*-linux-x86_64.tar.gz` — extract and run `./ZeebrooPosDesktop` |
            | **Windows** (x64) | `ZeebrooPosDesktop-*-windows-x64.zip` — unzip and run `ZeebrooPosDesktop.exe` |

            Copy `config.example.json` to your [config path](https://github.com/Zeebroo-Team/zeebroo-pos-desktop#configuration) or set the API URL on the sign-in screen.
          files: release-flat/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
